[flake8]
max-line-length = 99
extend-ignore = E203, W503
exclude =
    .venv,
    .git,
    __pycache__,
    htmlcov

[mypy]
python_version = 3.11
strict = True
ignore_missing_imports = True
exclude = (\.venv|htmlcov|tests)

[mypy-tabulate]
ignore_missing_imports = True

[tool:pytest]
testpaths = tests
addopts = --tb=short

[coverage:run]
source = utils, main
omit =
    .venv/*
    tests/*
    htmlcov/*

[coverage:report]
show_missing = True
fail_under = 80

[isort]
profile = black
line_length = 99
